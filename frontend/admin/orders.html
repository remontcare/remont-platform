<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Orders</h1><p>View and manage all platform orders</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header"><span class="card-title">All Orders</span></div>
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9">
        <div class="filter-bar">
          <select id="status" class="form-control" style="width:200px" onchange="load()">
            <option value="">All Statuses</option>
            <option value="PENDING_PAYMENT">Pending Payment</option>
            <option value="CONFIRMED">Confirmed</option>
            <option value="VENDOR_ASSIGNED">Vendor Assigned</option>
            <option value="VENDOR_EN_ROUTE">En Route</option>
            <option value="IN_PROGRESS">In Progress</option>
            <option value="COMPLETED">Completed</option>
            <option value="CANCELLED">Cancelled</option>
            <option value="REFUNDED">Refunded</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="load()">🔄 Refresh</button>
        </div>
      </div>
      <div class="table-wrap"><div id="tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Refund modal -->
<div id="refund-overlay" class="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Issue Refund</span>
      <button class="modal-close" onclick="closeModal('refund-overlay')">×</button>
    </div>
    <p style="font-size:13px;color:#64748b;margin-bottom:14px">Order: <strong id="refund-order-num"></strong></p>
    <div class="form-group">
      <label class="form-label">Reason for Refund</label>
      <textarea id="refund-reason" class="form-control" placeholder="Explain why this order is being refunded…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('refund-overlay')">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="confirmRefund()">Issue Refund</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('orders');
if (!requireAuth()) {}

var selectedOrderId = '';

function load() {
  var status = document.getElementById('status').value;
  var path = '/admin/orders?limit=80' + (status ? '&status=' + status : '');
  document.getElementById('tbl').innerHTML = '<div class="loading">Loading…</div>';
  api('GET', path).then(renderTable).catch(function(e){
    document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>' + escape(e.message) + '</h3></div>';
  });
}

function renderTable(orders) {
  if (!orders || !orders.length) {
    document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>No orders found</h3></div>';
    return;
  }
  var rows = orders.map(function(o) {
    var customer = o.customer ? escape(o.customer.name||o.customer.phone) : '—';
    var vendor = o.vendor ? escape(o.vendor.user.name||o.vendor.user.phone) : '<span class="text-muted">Unassigned</span>';
    var service = o.service ? escape(o.service.name) : '—';
    var city = o.address ? escape(o.address.city) : '—';
    return '<tr>' +
      '<td><strong>' + escape(o.orderNumber) + '</strong></td>' +
      '<td>' + customer + '</td>' +
      '<td>' + service + '</td>' +
      '<td>' + vendor + '</td>' +
      '<td>' + city + '</td>' +
      '<td><span class="badge ' + statusBadge(o.status) + '">' + o.status.replace(/_/g,' ') + '</span></td>' +
      '<td><span class="badge ' + payBadge(o.paymentStatus) + '">' + o.paymentStatus + '</span></td>' +
      '<td>' + fmtCur(o.totalAmount) + '</td>' +
      '<td>' + fmtDate(o.createdAt) + '</td>' +
      '<td style="white-space:nowrap">' +
        (o.status !== 'COMPLETED' && o.status !== 'REFUNDED' && o.status !== 'CANCELLED' ?
          '<button class="btn btn-xs btn-danger" onclick="openRefund(\'' + o.id + '\',\'' + escape(o.orderNumber) + '\')">Refund</button>' : '') +
      '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tbl').innerHTML =
    '<table><thead><tr><th>Order #</th><th>Customer</th><th>Service</th><th>Vendor</th><th>City</th><th>Status</th><th>Payment</th><th>Amount</th><th>Date</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function statusBadge(s) {
  var m = {PENDING_PAYMENT:'badge-yellow',CONFIRMED:'badge-blue',VENDOR_ASSIGNED:'badge-purple',VENDOR_EN_ROUTE:'badge-purple',IN_PROGRESS:'badge-orange',COMPLETED:'badge-green',CANCELLED:'badge-gray',REFUNDED:'badge-red'};
  return m[s] || 'badge-gray';
}
function payBadge(s) {
  return {PAID:'badge-green',PENDING:'badge-yellow',FAILED:'badge-red',REFUNDED:'badge-red',PARTIAL:'badge-orange'}[s] || 'badge-gray';
}

function openRefund(id, num) {
  selectedOrderId = id;
  document.getElementById('refund-order-num').textContent = num;
  document.getElementById('refund-reason').value = '';
  document.getElementById('refund-overlay').classList.add('open');
}

function confirmRefund() {
  var reason = document.getElementById('refund-reason').value.trim();
  if (!reason) { toast('Enter a refund reason', 'error'); return; }
  api('PATCH', '/admin/orders/' + selectedOrderId + '/refund', { reason: reason }).then(function(){
    toast('Refund processed', 'success'); closeModal('refund-overlay'); load();
  }).catch(function(e){ toast(e.message,'error'); });
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
load();
</script>
</body>
</html>
