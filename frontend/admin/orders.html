<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Orders</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Orders</h1><p>Manage all customer orders</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:8px">
        <span class="card-title">All Orders</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="filter-status" class="form-control" style="width:180px" onchange="load()">
            <option value="">All Statuses</option>
            <option>PENDING</option><option>CONFIRMED</option><option>VENDOR_ASSIGNED</option>
            <option>EN_ROUTE</option><option>IN_PROGRESS</option><option>COMPLETED</option>
            <option>CANCELLED</option><option>REFUNDED</option>
          </select>
          <input id="filter-city" class="form-control" style="width:130px" placeholder="Filter city…" oninput="load()">
          <button class="btn btn-outline btn-sm" onclick="load()">↺ Refresh</button>
        </div>
      </div>
      <div class="table-wrap"><div id="tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<div id="action-overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="action-title">Order Action</span>
      <button class="modal-close" onclick="closeModal('action-overlay')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label" id="action-label">Reason</label>
      <textarea id="action-reason" class="form-control" rows="3" placeholder="Enter reason…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('action-overlay')">Cancel</button>
      <button class="btn btn-primary" id="action-confirm-btn" onclick="confirmAction()">Confirm</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('orders');
requireAuth();
var pendingAction = null;

function load() {
  var status = document.getElementById('filter-status').value;
  var city = document.getElementById('filter-city').value;
  var p = [];
  if (status) p.push('status='+encodeURIComponent(status));
  if (city) p.push('city='+encodeURIComponent(city));
  p.push('limit=100');
  document.getElementById('tbl').innerHTML = '<div class="loading">Loading…</div>';
  api('GET','/admin/orders'+(p.length?'?'+p.join('&'):'')).then(function(orders) {
    if (!orders||!orders.length) { document.getElementById('tbl').innerHTML='<div class="empty-state"><div class="empty-icon">📦</div><h3>No orders found</h3></div>'; return; }
    var rows = orders.map(function(o) {
      var customer=(o.customer&&o.customer.name)||(o.customer&&o.customer.phone)||'—';
      var vendor=o.vendor?((o.vendor.user&&o.vendor.user.name)||o.vendor.fullName||'Assigned'):'<span style="color:#9ca3af">Unassigned</span>';
      var svc=(o.service&&o.service.name)||'—';
      var city=(o.address&&o.address.city)||'—';
      var canCancel = ['COMPLETED','CANCELLED','REFUNDED'].indexOf(o.status)===-1;
      var canRefund = ['REFUNDED','CANCELLED'].indexOf(o.status)===-1 && o.paymentStatus==='PAID';
      return '<tr>'+
        '<td style="font-family:monospace;font-size:11px">'+escape(o.id.slice(-8))+'</td>'+
        '<td>'+escape(customer)+'</td>'+
        '<td>'+escape(svc)+'</td>'+
        '<td>'+escape(city)+'</td>'+
        '<td>'+fmtCur(o.totalAmount)+'</td>'+
        '<td>'+statusBadge(o.status)+'</td>'+
        '<td>'+statusBadge(o.paymentStatus||'—')+'</td>'+
        '<td>'+fmtDateShort(o.createdAt)+'</td>'+
        '<td><div style="display:flex;gap:4px">'+
          (canCancel?'<button class="btn btn-xs btn-warning" onclick="openAction(\'cancel\',\''+o.id+'\')">Cancel</button>':'')+
          (canRefund?'<button class="btn btn-xs" style="background:#f97316;color:#fff;padding:3px 8px;font-size:11px;border-radius:4px;border:none;cursor:pointer" onclick="openAction(\'refund\',\''+o.id+'\')">Refund</button>':'')+
        '</div></td>'+
      '</tr>';
    }).join('');
    document.getElementById('tbl').innerHTML='<table><thead><tr><th>ID</th><th>Customer</th><th>Service</th><th>City</th><th>Amount</th><th>Status</th><th>Payment</th><th>Date</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).catch(function(e){ document.getElementById('tbl').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><h3>'+escape(e.message)+'</h3></div>'; });
}

function openAction(type, orderId) {
  pendingAction={type:type,orderId:orderId};
  document.getElementById('action-title').textContent=type==='cancel'?'Cancel Order':'Refund Order';
  document.getElementById('action-label').textContent=type==='cancel'?'Cancellation Reason':'Refund Reason';
  document.getElementById('action-reason').value='';
  var btn=document.getElementById('action-confirm-btn');
  btn.style.background=type==='cancel'?'#ef4444':'#f97316';
  btn.textContent=type==='cancel'?'Cancel Order':'Refund Order';
  document.getElementById('action-overlay').style.display='flex';
}

function confirmAction() {
  if (!pendingAction) return;
  var reason=document.getElementById('action-reason').value.trim();
  if (!reason) { toast('Enter a reason','error'); return; }
  api('PATCH','/admin/orders/'+pendingAction.orderId+'/'+pendingAction.type,{reason:reason}).then(function(){
    toast(pendingAction.type==='cancel'?'Order cancelled':'Order refunded','success');
    closeModal('action-overlay'); load();
  }).catch(function(e){ toast(e.message,'error'); });
}

load();
</script>
</body>
</html>
