<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Products</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Products</h1><p>Manage products catalog</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      <div class="card">
        <div class="card-header"><span class="card-title">Product Categories</span><button class="btn btn-primary btn-sm" onclick="openCatModal()">+ Add Category</button></div>
        <div class="table-wrap"><div id="cat-tbl" class="loading">Loading…</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:8px">
        <span class="card-title">All Products</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <input id="filter-q" class="form-control" style="width:200px" placeholder="Search name, SKU, brand…" oninput="loadProducts()">
          <select id="filter-cat" class="form-control" style="width:180px" onchange="loadProducts()">
            <option value="">All Categories</option>
          </select>
          <button class="btn btn-outline btn-sm" onclick="loadProducts()">↺ Refresh</button>
        </div>
      </div>
      <div class="table-wrap"><div id="prod-tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Category Modal -->
<div id="cat-overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Add Product Category</span><button class="modal-close" onclick="closeModal('cat-overlay')">×</button></div>
    <div class="form-group"><label class="form-label">Key (uppercase) *</label><input id="pcat-key" class="form-control" placeholder="AC_PRODUCTS"></div>
    <div class="form-group"><label class="form-label">Name *</label><input id="pcat-name" class="form-control" placeholder="AC & Cooling"></div>
    <div class="form-group"><label class="form-label">Icon</label><input id="pcat-icon" class="form-control" placeholder="❄️"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('cat-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCat()">Save</button>
    </div>
  </div>
</div>

<!-- Edit Product Modal -->
<div id="prod-overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">Edit Product</span><button class="modal-close" onclick="closeModal('prod-overlay')">×</button></div>
    <input type="hidden" id="edit-prod-id">
    <div class="form-group"><label class="form-label">Name</label><input id="edit-name" class="form-control"></div>
    <div class="form-group"><label class="form-label">Brand</label><input id="edit-brand" class="form-control"></div>
    <div class="form-row">
      <div class="form-group" style="flex:1"><label class="form-label">Price (₹) *</label><input id="edit-price" class="form-control" type="number"></div>
      <div class="form-group" style="flex:1"><label class="form-label">MRP (₹)</label><input id="edit-mrp" class="form-control" type="number"></div>
    </div>
    <div class="form-group"><label class="form-label">Stock</label><input id="edit-stock" class="form-control" type="number"></div>
    <div class="form-check">
      <input type="checkbox" id="edit-active">
      <label for="edit-active" style="margin-left:6px">Active (visible on website)</label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('prod-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Changes</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('products');
requireAuth();

function loadCats() {
  api('GET','/admin/product-categories').then(function(cats){
    if (!cats||!cats.length){ document.getElementById('cat-tbl').innerHTML='<div style="padding:12px;color:#6b7280;font-size:13px">No categories yet. Add one.</div>'; return; }
    var sel=document.getElementById('filter-cat');
    sel.innerHTML='<option value="">All Categories</option>';
    cats.forEach(function(c){ var o=document.createElement('option'); o.value=c.id; o.textContent=(c.icon||'')+' '+c.name; sel.appendChild(o); });
    var rows=cats.map(function(c){return '<tr><td>'+(c.icon||'')+'</td><td>'+escape(c.name)+'</td><td><code style="font-size:11px">'+escape(c.key)+'</code></td></tr>';}).join('');
    document.getElementById('cat-tbl').innerHTML='<table><thead><tr><th></th><th>Name</th><th>Key</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).catch(function(e){document.getElementById('cat-tbl').innerHTML='<small style="color:red">'+escape(e.message)+'</small>';});
}

function loadProducts() {
  var q=document.getElementById('filter-q').value;
  var catId=document.getElementById('filter-cat').value;
  var p=['limit=100'];
  if (q) p.push('q='+encodeURIComponent(q));
  if (catId) p.push('categoryId='+encodeURIComponent(catId));
  document.getElementById('prod-tbl').innerHTML='<div class="loading">Loading…</div>';
  api('GET','/admin/products?'+p.join('&')).then(function(prods){
    if (!prods||!prods.length){ document.getElementById('prod-tbl').innerHTML='<div class="empty-state"><div class="empty-icon">🛍</div><h3>No products found</h3></div>'; return; }
    var rows=prods.map(function(p){
      var cat=(p.category&&p.category.name)||'—';
      var vendor=(p.vendor&&p.vendor.businessName)||'—';
      return '<tr>'+
        '<td>'+escape(p.sku||'—')+'</td>'+
        '<td><strong>'+escape(p.name)+'</strong></td>'+
        '<td>'+escape(p.brand||'—')+'</td>'+
        '<td>'+escape(cat)+'</td>'+
        '<td>'+fmtCur(p.price)+' / MRP '+fmtCur(p.mrp)+'</td>'+
        '<td style="text-align:center">'+escape(String(p.stock||0))+'</td>'+
        '<td>'+badge(p.isActive?'Active':'Inactive',p.isActive?'green':'gray')+'</td>'+
        '<td><button class="btn btn-xs btn-outline" onclick="openEdit('+JSON.stringify(p)+')">Edit</button></td>'+
      '</tr>';
    }).join('');
    document.getElementById('prod-tbl').innerHTML='<table><thead><tr><th>SKU</th><th>Product</th><th>Brand</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).catch(function(e){document.getElementById('prod-tbl').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><h3>'+escape(e.message)+'</h3></div>';});
}

function openCatModal(){document.getElementById('cat-overlay').style.display='flex';}
function saveCat(){
  var key=document.getElementById('pcat-key').value.trim().toUpperCase();
  var name=document.getElementById('pcat-name').value.trim();
  var icon=document.getElementById('pcat-icon').value.trim();
  if(!key||!name){toast('Key and name required','error');return;}
  api('POST','/admin/product-categories',{key,name,icon}).then(function(){toast('Category created','success');closeModal('cat-overlay');loadCats();}).catch(function(e){toast(e.message,'error');});
}

function openEdit(p){
  document.getElementById('edit-prod-id').value=p.id;
  document.getElementById('edit-name').value=p.name||'';
  document.getElementById('edit-brand').value=p.brand||'';
  document.getElementById('edit-price').value=p.price||'';
  document.getElementById('edit-mrp').value=p.mrp||'';
  document.getElementById('edit-stock').value=p.stock||0;
  document.getElementById('edit-active').checked=p.isActive!==false;
  document.getElementById('prod-overlay').style.display='flex';
}

function saveProduct(){
  var id=document.getElementById('edit-prod-id').value;
  var price=parseFloat(document.getElementById('edit-price').value);
  if(isNaN(price)){toast('Enter valid price','error');return;}
  var data={
    name:document.getElementById('edit-name').value.trim(),
    brand:document.getElementById('edit-brand').value.trim(),
    price:price,
    mrp:parseFloat(document.getElementById('edit-mrp').value)||undefined,
    stock:parseInt(document.getElementById('edit-stock').value)||0,
    isActive:document.getElementById('edit-active').checked,
  };
  api('PATCH','/admin/products/'+id,data).then(function(){toast('Product updated','success');closeModal('prod-overlay');loadProducts();}).catch(function(e){toast(e.message,'error');});
}

loadCats();
loadProducts();
</script>
</body>
</html>
