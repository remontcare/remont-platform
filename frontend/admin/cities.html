<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Cities</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Cities</h1><p>City activation is entirely database-driven — no code change or redeploy needed to launch or pause a city</p></div>
    <div class="topbar-right">
      <button class="btn btn-primary btn-sm" onclick="openAddCity()">+ Add City</button>
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">

    <!-- STATS STRIP -->
    <div id="stats-strip" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px">
      <div class="card" style="padding:14px 18px"><div style="font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase">Total Cities</div><div id="st-total" style="font-size:26px;font-weight:800">—</div></div>
      <div class="card" style="padding:14px 18px"><div style="font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase">Active</div><div id="st-active" style="font-size:26px;font-weight:800;color:#22c55e">—</div></div>
      <div class="card" style="padding:14px 18px"><div style="font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase">Inactive</div><div id="st-inactive" style="font-size:26px;font-weight:800;color:#ef4444">—</div></div>
      <div class="card" style="padding:14px 18px"><div style="font-size:11px;color:#6b7280;font-weight:700;text-transform:uppercase">Launch Mode</div><div id="st-mode" style="font-size:20px;font-weight:800">—</div></div>
    </div>

    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:8px">
        <span class="card-title">All Cities</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-outline btn-sm" onclick="toggleSelected(true)">Activate Selected</button>
          <button class="btn btn-outline btn-sm" onclick="toggleSelected(false)">Deactivate Selected</button>
          <button class="btn btn-success btn-sm" onclick="toggleAll(true)">Enable All Cities</button>
          <button class="btn btn-warning btn-sm" onclick="toggleAll(false)">Disable All Cities</button>
        </div>
      </div>
      <div class="table-wrap"><div id="tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Add City Modal -->
<div id="city-overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add City</span>
      <button class="modal-close" onclick="closeModal('city-overlay')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">City Name *</label>
      <input id="city-name" class="form-control" placeholder="e.g. Indore">
    </div>
    <div class="form-group">
      <label class="form-label">State *</label>
      <input id="city-state" class="form-control" placeholder="e.g. Madhya Pradesh">
    </div>
    <div class="form-row">
      <div class="form-group" style="flex:1">
        <label class="form-label">Latitude *</label>
        <input id="city-lat" class="form-control" type="number" step="any" placeholder="22.7196">
      </div>
      <div class="form-group" style="flex:1">
        <label class="form-label">Longitude *</label>
        <input id="city-lng" class="form-control" type="number" step="any" placeholder="75.8577">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Pincodes (comma-separated)</label>
      <input id="city-pincodes" class="form-control" placeholder="452001, 452002, 452010">
    </div>
    <div class="form-group">
      <label class="form-label">Active Service Keys (comma-separated)</label>
      <input id="city-services" class="form-control" placeholder="AC_SERVICE, PLUMBING, ELECTRICAL">
    </div>
    <div class="form-check" style="margin-bottom:12px">
      <input type="checkbox" id="city-active" checked>
      <label for="city-active" style="margin-left:6px">Active</label>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('city-overlay')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCity()">Save City</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('cities');
if (!requireAuth()) {}

function load() {
  Promise.all([api('GET', '/admin/cities'), api('GET', '/admin/cities/stats')]).then(function(results) {
    var cities = results[0], stats = results[1];
    document.getElementById('st-total').textContent = stats.totalCities;
    document.getElementById('st-active').textContent = stats.activeCities;
    document.getElementById('st-inactive').textContent = stats.inactiveCities;
    document.getElementById('st-mode').textContent = stats.launchMode === 'SINGLE_CITY' ? '🏙 Single-City' : '🌍 Multi-City';

    if (!cities || !cities.length) {
      document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">🏙</div><h3>No cities configured</h3><p>Click "+ Add City" to add your first city.</p></div>';
      return;
    }
    var statsByName = {};
    (stats.cities || []).forEach(function(s) { statsByName[s.name] = s; });

    var rows = cities.map(function(c) {
      var s = statsByName[c.name] || { sellerCount: 0, technicianCount: 0, productCount: 0, serviceAvailability: 0 };
      return '<tr>' +
        '<td><input type="checkbox" class="city-chk" value="' + escape(c.name) + '"></td>' +
        '<td><strong>' + escape(c.name) + '</strong></td>' +
        '<td>' + escape(c.state) + '</td>' +
        '<td style="text-align:center">' + s.sellerCount + '</td>' +
        '<td style="text-align:center">' + s.technicianCount + '</td>' +
        '<td style="text-align:center">' + s.productCount + '</td>' +
        '<td style="text-align:center">' + s.serviceAvailability + '</td>' +
        '<td>' + c.priceMultiplier + 'x</td>' +
        '<td><span class="badge ' + (c.isActive?'badge-green':'badge-gray') + '">' + (c.isActive?'Active':'Inactive') + '</span></td>' +
        '<td>' +
          '<button class="btn btn-xs ' + (c.isActive?'btn-warning':'btn-success') + '" onclick="toggle(\'' + c.name + '\',' + !c.isActive + ',this)">' + (c.isActive?'Disable':'Enable') + '</button>' +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('tbl').innerHTML =
      '<table><thead><tr><th><input type="checkbox" onclick="toggleCheckAll(this)"></th><th>City</th><th>State</th><th>Sellers</th><th>Technicians</th><th>Products</th><th>Services</th><th>Price Mult.</th><th>Status</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }).catch(function(e){
    document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>' + escape(e.message) + '</h3></div>';
  });
}

function toggleCheckAll(master) {
  document.querySelectorAll('.city-chk').forEach(function(chk) { chk.checked = master.checked; });
}

function toggle(name, active, btn) {
  btn.disabled = true;
  api('PATCH', '/admin/cities/' + encodeURIComponent(name) + '/toggle', { isActive: active }).then(function(){
    toast(active ? name + ' enabled' : name + ' disabled', active ? 'success' : 'warning'); load();
  }).catch(function(e){ toast(e.message,'error'); btn.disabled=false; });
}

function selectedCityNames() {
  return Array.from(document.querySelectorAll('.city-chk:checked')).map(function(chk) { return chk.value; });
}

function toggleSelected(active) {
  var names = selectedCityNames();
  if (!names.length) { toast('Select at least one city first', 'error'); return; }
  if (!confirm((active ? 'Activate' : 'Deactivate') + ' ' + names.length + ' selected cit' + (names.length === 1 ? 'y' : 'ies') + '?')) return;
  api('PATCH', '/admin/cities/bulk', { cityNames: names, isActive: active }).then(function() {
    toast(names.length + ' cit' + (names.length === 1 ? 'y' : 'ies') + ' ' + (active ? 'activated' : 'deactivated'), active ? 'success' : 'warning');
    load();
  }).catch(function(e) { toast(e.message, 'error'); });
}

function toggleAll(active) {
  if (!confirm((active ? 'Enable' : 'Disable') + ' ALL cities? This affects every city in the system.')) return;
  api('PATCH', '/admin/cities/all', { isActive: active }).then(function() {
    toast('All cities ' + (active ? 'enabled' : 'disabled'), active ? 'success' : 'warning');
    load();
  }).catch(function(e) { toast(e.message, 'error'); });
}

function openAddCity() {
  document.getElementById('city-name').value = '';
  document.getElementById('city-state').value = '';
  document.getElementById('city-lat').value = '';
  document.getElementById('city-lng').value = '';
  document.getElementById('city-pincodes').value = '';
  document.getElementById('city-services').value = '';
  document.getElementById('city-active').checked = true;
  document.getElementById('city-overlay').style.display = 'flex';
}

function saveCity() {
  var name = document.getElementById('city-name').value.trim();
  var state = document.getElementById('city-state').value.trim();
  var lat = parseFloat(document.getElementById('city-lat').value);
  var lng = parseFloat(document.getElementById('city-lng').value);
  if (!name || !state) { toast('City name and state are required', 'error'); return; }
  if (isNaN(lat) || isNaN(lng)) { toast('Enter valid latitude and longitude', 'error'); return; }
  var pincodeStr = document.getElementById('city-pincodes').value.trim();
  var svcStr = document.getElementById('city-services').value.trim();
  var data = {
    name: name,
    state: state,
    latitude: lat,
    longitude: lng,
    isActive: document.getElementById('city-active').checked,
    pincodes: pincodeStr ? pincodeStr.split(',').map(function(p){ return p.trim(); }).filter(Boolean) : [],
    activeServiceKeys: svcStr ? svcStr.split(',').map(function(s){ return s.trim().toUpperCase(); }).filter(Boolean) : [],
  };
  api('POST', '/admin/cities', data).then(function(){
    toast('City created', 'success');
    closeModal('city-overlay');
    load();
  }).catch(function(e){ toast(e.message, 'error'); });
}

load();
</script>
</body>
</html>
