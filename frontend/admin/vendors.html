<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Vendors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Vendors</h1><p>Manage service vendors</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div id="pending-section" class="card" style="margin-bottom:16px;border-left:4px solid #f59e0b">
      <div class="card-header"><span class="card-title">⚠️ Pending Approval</span></div>
      <div class="table-wrap"><div id="pending-tbl" class="loading">Loading…</div></div>
    </div>
    <div class="card">
      <div class="card-header" style="flex-wrap:wrap;gap:8px">
        <span class="card-title">All Vendors</span>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="filter-status" class="form-control" style="width:200px" onchange="loadAll()">
            <option value="">All Statuses</option>
            <option>ACTIVE</option><option>PENDING_VERIFICATION</option>
            <option>SUSPENDED</option><option>REJECTED</option>
          </select>
          <input id="filter-q" class="form-control" style="width:160px" placeholder="Search name…" oninput="loadAll()">
          <button class="btn btn-outline btn-sm" onclick="loadAll()">↺ Refresh</button>
        </div>
      </div>
      <div class="table-wrap"><div id="all-tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<div id="reject-overlay" class="overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Reject Vendor</span>
      <button class="modal-close" onclick="closeModal('reject-overlay')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Rejection Reason *</label>
      <textarea id="reject-reason" class="form-control" rows="3" placeholder="Explain why this vendor is being rejected…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('reject-overlay')">Cancel</button>
      <button class="btn btn-primary" style="background:#ef4444" onclick="confirmReject()">Reject Vendor</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('vendors');
requireAuth();
var rejectVendorId = null;

function loadPending() {
  api('GET','/admin/vendors/pending').then(function(vendors) {
    if (!vendors||!vendors.length) {
      document.getElementById('pending-tbl').innerHTML='<div style="padding:12px;color:#6b7280;font-size:13px">No pending vendors 🎉</div>';
      return;
    }
    var rows = vendors.map(function(v) {
      var u=v.user||{};
      return '<tr>'+
        '<td><strong>'+escape(v.fullName||v.businessName||'—')+'</strong><br><small style="color:#6b7280">'+escape(u.phone||'')+'</small></td>'+
        '<td>'+escape(v.businessName||'—')+'</td>'+
        '<td>'+(v.skills||[]).map(function(s){return badge(s,'blue');}).join(' ')+'</td>'+
        '<td>'+escape(v.currentCity||'—')+'</td>'+
        '<td>'+fmtDateShort(v.createdAt)+'</td>'+
        '<td><div style="display:flex;gap:4px">'+
          '<button class="btn btn-xs btn-success" onclick="approve(\''+v.id+'\')">✓ Approve</button>'+
          '<button class="btn btn-xs btn-warning" onclick="openReject(\''+v.id+'\')">✗ Reject</button>'+
        '</div></td>'+
      '</tr>';
    }).join('');
    document.getElementById('pending-tbl').innerHTML='<table><thead><tr><th>Name</th><th>Business</th><th>Skills</th><th>City</th><th>Applied</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).catch(function(e){document.getElementById('pending-tbl').innerHTML='<div class="empty-state"><small>'+escape(e.message)+'</small></div>';});
}

function loadAll() {
  var status=document.getElementById('filter-status').value;
  var q=document.getElementById('filter-q').value;
  var p=[];
  if (status) p.push('status='+encodeURIComponent(status));
  if (q) p.push('q='+encodeURIComponent(q));
  p.push('limit=100');
  document.getElementById('all-tbl').innerHTML='<div class="loading">Loading…</div>';
  api('GET','/admin/vendors'+(p.length?'?'+p.join('&'):'')).then(function(vendors) {
    if (!vendors||!vendors.length) { document.getElementById('all-tbl').innerHTML='<div class="empty-state"><div class="empty-icon">🏪</div><h3>No vendors found</h3></div>'; return; }
    var rows=vendors.map(function(v) {
      var u=v.user||{};
      return '<tr>'+
        '<td><strong>'+escape(v.fullName||'—')+'</strong><br><small style="color:#6b7280">'+escape(u.phone||u.email||'')+'</small></td>'+
        '<td>'+escape(v.businessName||'—')+'</td>'+
        '<td>'+(v.skills||[]).slice(0,3).map(function(s){return badge(s,'blue');}).join(' ')+'</td>'+
        '<td>'+escape(v.currentCity||'—')+'</td>'+
        '<td style="text-align:center">'+escape(String(v.rating||'—'))+' ★ ('+escape(String(v.totalJobs||0))+')</td>'+
        '<td>'+badge(v.isOnline?'Online':'Offline',v.isOnline?'green':'gray')+'</td>'+
        '<td>'+statusBadge(v.status)+'</td>'+
        '<td><div style="display:flex;gap:4px">'+
          (v.status==='PENDING_VERIFICATION'?'<button class="btn btn-xs btn-success" onclick="approve(\''+v.id+'\')">Approve</button>':'')+
          (v.status==='ACTIVE'?'<button class="btn btn-xs btn-warning" onclick="suspend(\''+v.id+'\')">Suspend</button>':'')+
          (v.status==='SUSPENDED'?'<button class="btn btn-xs btn-success" onclick="approve(\''+v.id+'\')">Reactivate</button>':'')+
        '</div></td>'+
      '</tr>';
    }).join('');
    document.getElementById('all-tbl').innerHTML='<table><thead><tr><th>Vendor</th><th>Business</th><th>Skills</th><th>City</th><th>Rating / Jobs</th><th>Online</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+rows+'</tbody></table>';
  }).catch(function(e){document.getElementById('all-tbl').innerHTML='<div class="empty-state"><div class="empty-icon">⚠️</div><h3>'+escape(e.message)+'</h3></div>';});
}

function approve(id) {
  api('PATCH','/admin/vendors/'+id+'/approve').then(function(){ toast('Vendor approved','success'); loadPending(); loadAll(); }).catch(function(e){toast(e.message,'error');});
}
function suspend(id) {
  if (!confirm('Suspend this vendor?')) return;
  api('PATCH','/admin/vendors/'+id+'/suspend').then(function(){ toast('Vendor suspended','warning'); loadAll(); }).catch(function(e){toast(e.message,'error');});
}
function openReject(id) { rejectVendorId=id; document.getElementById('reject-reason').value=''; document.getElementById('reject-overlay').style.display='flex'; }
function confirmReject() {
  var reason=document.getElementById('reject-reason').value.trim();
  if (!reason){toast('Enter rejection reason','error');return;}
  api('PATCH','/admin/vendors/'+rejectVendorId+'/reject',{reason:reason}).then(function(){ toast('Vendor rejected','warning'); closeModal('reject-overlay'); loadPending(); loadAll(); }).catch(function(e){toast(e.message,'error');});
}

loadPending(); loadAll();
</script>
</body>
</html>
