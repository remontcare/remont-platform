<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Vendors</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Vendors</h1><p>Approve, reject and manage service vendors</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <!-- Pending approvals -->
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><span class="card-title">⚠️ Pending Approvals</span></div>
      <div class="table-wrap"><div id="pending-tbl" class="loading">Loading…</div></div>
    </div>

    <!-- All vendors -->
    <div class="card">
      <div class="card-header"><span class="card-title">All Service Vendors</span></div>
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9">
        <div class="filter-bar">
          <input id="q" class="search-input" placeholder="Search name / business…" oninput="debounce(loadAll)">
          <select id="status" class="form-control" style="width:180px" onchange="loadAll()">
            <option value="">All Statuses</option>
            <option value="PENDING_VERIFICATION">Pending</option>
            <option value="ACTIVE">Active</option>
            <option value="SUSPENDED">Suspended</option>
            <option value="REJECTED">Rejected</option>
          </select>
        </div>
      </div>
      <div class="table-wrap"><div id="all-tbl" class="loading">Loading…</div></div>
    </div>
  </div>
</div>

<!-- Reject modal -->
<div id="reject-overlay" class="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Reject Vendor</span>
      <button class="modal-close" onclick="closeModal('reject-overlay')">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Rejection Reason</label>
      <textarea id="reject-reason" class="form-control" placeholder="Explain why this vendor is being rejected…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('reject-overlay')">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="confirmReject()">Reject Vendor</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('vendors');
if (!requireAuth()) {}

var selectedVendorId = '';
var timer;
function debounce(fn) { clearTimeout(timer); timer = setTimeout(fn, 400); }

function loadPending() {
  api('GET', '/admin/vendors/pending').then(function(vendors) {
    if (!vendors || !vendors.length) {
      document.getElementById('pending-tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><h3>No pending approvals</h3></div>';
      return;
    }
    var rows = vendors.map(function(v) {
      return '<tr>' +
        '<td><strong>' + escape(v.fullName) + '</strong><br><span class="text-muted">' + escape(v.baseCity) + '</span></td>' +
        '<td>' + escape(v.user.phone) + '</td>' +
        '<td>' + escape(v.user.email||'—') + '</td>' +
        '<td>' + (v.skills||[]).map(function(s){ return '<span class="badge badge-blue" style="margin:1px">' + escape(s) + '</span>'; }).join('') + '</td>' +
        '<td>' + fmtDate(v.createdAt) + '</td>' +
        '<td style="white-space:nowrap">' +
          '<button class="btn btn-xs btn-success" onclick="approve(\'' + v.id + '\',this)">Approve</button> ' +
          '<button class="btn btn-xs btn-danger" onclick="openReject(\'' + v.id + '\')">Reject</button>' +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('pending-tbl').innerHTML =
      '<table><thead><tr><th>Name / City</th><th>Phone</th><th>Email</th><th>Skills</th><th>Applied</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }).catch(function(e){
    document.getElementById('pending-tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>' + escape(e.message) + '</h3></div>';
  });
}

function loadAll() {
  var q = document.getElementById('q').value.trim();
  var status = document.getElementById('status').value;
  var path = '/admin/vendors?limit=100' + (q?'&q='+encodeURIComponent(q):'') + (status?'&status='+status:'');
  document.getElementById('all-tbl').innerHTML = '<div class="loading">Loading…</div>';
  api('GET', path).then(function(vendors) {
    if (!vendors || !vendors.length) {
      document.getElementById('all-tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">🏪</div><h3>No vendors found</h3></div>';
      return;
    }
    var rows = vendors.map(function(v) {
      return '<tr>' +
        '<td><strong>' + escape(v.fullName) + '</strong>' + (v.businessName?'<br><span class="text-muted">'+escape(v.businessName)+'</span>':'') + '</td>' +
        '<td>' + escape(v.user.phone) + '</td>' +
        '<td>' + escape(v.baseCity) + '</td>' +
        '<td><span class="badge ' + statusBadge(v.status) + '">' + v.status + '</span></td>' +
        '<td>' + (v.isOnline?'<span class="badge badge-green">Online</span>':'<span class="badge badge-gray">Offline</span>') + '</td>' +
        '<td>' + v.rating.toFixed(1) + '★ (' + v.completedJobs + ' jobs)</td>' +
        '<td>' + fmtDate(v.createdAt) + '</td>' +
        '<td style="white-space:nowrap">' +
          (v.status==='ACTIVE' ? '<button class="btn btn-xs btn-warning" onclick="suspend(\'' + v.id + '\',this)">Suspend</button>' : '') +
          (v.status==='SUSPENDED' ? '<button class="btn btn-xs btn-success" onclick="approve(\'' + v.id + '\',this)">Restore</button>' : '') +
        '</td>' +
      '</tr>';
    }).join('');
    document.getElementById('all-tbl').innerHTML =
      '<table><thead><tr><th>Name</th><th>Phone</th><th>City</th><th>Status</th><th>Online</th><th>Rating</th><th>Joined</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
  }).catch(function(e){
    document.getElementById('all-tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>' + escape(e.message) + '</h3></div>';
  });
}

function statusBadge(s) {
  return {ACTIVE:'badge-green',PENDING_VERIFICATION:'badge-yellow',SUSPENDED:'badge-orange',REJECTED:'badge-red'}[s] || 'badge-gray';
}

function approve(id, btn) {
  if (btn) btn.disabled = true;
  api('PATCH', '/admin/vendors/' + id + '/approve').then(function(){
    toast('Vendor approved', 'success');
    loadPending(); loadAll();
  }).catch(function(e){ toast(e.message,'error'); if(btn)btn.disabled=false; });
}

function openReject(id) {
  selectedVendorId = id;
  document.getElementById('reject-reason').value = '';
  document.getElementById('reject-overlay').classList.add('open');
}

function confirmReject() {
  var reason = document.getElementById('reject-reason').value.trim();
  if (!reason) { toast('Enter a rejection reason', 'error'); return; }
  api('PATCH', '/admin/vendors/' + selectedVendorId + '/reject', { reason: reason }).then(function(){
    toast('Vendor rejected', 'error');
    closeModal('reject-overlay'); loadPending(); loadAll();
  }).catch(function(e){ toast(e.message,'error'); });
}

function suspend(id, btn) {
  if (!confirm('Suspend this vendor?')) return;
  if (btn) btn.disabled = true;
  api('PATCH', '/admin/vendors/' + id + '/suspend').then(function(){
    toast('Vendor suspended', 'warning'); loadAll();
  }).catch(function(e){ toast(e.message,'error'); if(btn)btn.disabled=false; });
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

loadPending(); loadAll();
</script>
</body>
</html>
