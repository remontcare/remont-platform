<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="login-page">
  <div class="login-beams"></div>
  <div class="login-orb orb-1"></div>
  <div class="login-orb orb-2"></div>
  <div class="login-floor"></div>
  <div class="login-card">
    <div class="login-logo">
      <div class="ll-circle">R</div>
      <h1>Remont India</h1>
      <p>Platform Administration</p>
      <div class="badge-admin">ADMIN PANEL</div>
    </div>

    <div id="err" class="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <div class="login-input-wrap">
        <span class="li-icon">📱</span>
        <input id="phone" class="form-control" type="tel" placeholder="Enter phone number">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Admin PIN</label>
      <div class="login-input-wrap">
        <span class="li-icon">🔒</span>
        <input id="pin" class="form-control" type="password" placeholder="Enter Admin PIN">
      </div>
    </div>
    <button id="login-btn" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">
      Login to Admin Panel
    </button>

    <div class="login-footer" style="margin-top:16px">
      🔐 Uses Phone + Admin PIN (set ADMIN_PIN on Railway)
    </div>
  </div>
</div>

<script>
var API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:3001' : '';

// Logo — admin-configurable from Settings → Brand & General → "Logo Image URL".
// Falls back to the "R" mark (default markup) if unset, unreachable, or the image fails to load.
(function(){
  fetch(API_BASE + '/api/v1/cms/settings?group=general')
    .then(function(r){ return r.json(); })
    .then(function(d){
      var url = d && d.data && d.data.logo_url;
      if (!url) return;
      var circle = document.querySelector('.ll-circle');
      if (!circle) return;
      var img = new Image();
      img.onload = function(){
        img.alt = 'Logo';
        img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:inherit';
        circle.textContent = '';
        circle.appendChild(img);
      };
      img.src = url;
    })
    .catch(function(){ /* keep default "R" mark */ });
})();

// Already logged in → go to dashboard
(function(){
  var token = localStorage.getItem('remont_admin_token');
  var user = {};
  try { user = JSON.parse(localStorage.getItem('remont_admin_user') || '{}'); } catch(e){}
  if (token && ['ADMIN','SUPER_ADMIN'].indexOf(user.role) !== -1) {
    window.location.replace('/admin/dashboard');
  }
})();

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  var phone = document.getElementById('phone').value.trim();
  var pin   = document.getElementById('pin').value.trim();
  var btn   = document.getElementById('login-btn');

  if (!phone) { showErr('Enter phone number'); return; }
  if (!pin)   { showErr('Enter admin PIN'); return; }

  // Normalise phone — add +91 if missing
  if (!phone.startsWith('+')) phone = '+91' + phone.replace(/^0/, '');

  btn.disabled = true;
  btn.textContent = 'Logging in…';
  document.getElementById('err').style.display = 'none';

  fetch(API_BASE + '/api/v1/auth/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ phone: phone, pin: pin })
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    btn.disabled = false;
    btn.textContent = 'Login to Admin Panel';

    var payload = (d && d.data) ? d.data : d;

    if (!payload || !payload.accessToken) {
      showErr(d.message || (d.data && d.data.message) || 'Login failed — check phone and PIN');
      return;
    }

    var role = payload.user && payload.user.role;
    if (['ADMIN','SUPER_ADMIN'].indexOf(role) === -1) {
      showErr('Access denied. This account does not have admin privileges.');
      return;
    }

    localStorage.setItem('remont_admin_token', payload.accessToken);
    localStorage.setItem('remont_admin_user', JSON.stringify(payload.user));
    window.location.replace('/admin/dashboard');
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = 'Login to Admin Panel';
    showErr('Cannot connect to server. Check your network or Railway status.');
  });
}

document.addEventListener('keydown', function(e){
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
