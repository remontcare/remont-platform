<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h1>Remont India</h1>
      <p>Platform Administration</p>
      <div class="badge-admin">ADMIN PANEL</div>
    </div>

    <div id="err" class="error-msg"></div>

    <!-- Step 1: Phone -->
    <div id="step1" class="step active">
      <div class="form-group">
        <label class="form-label">Admin Phone Number</label>
        <input id="phone" class="form-control" type="tel" placeholder="+91XXXXXXXXXX" maxlength="13">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="sendOtp()">
        Send OTP
      </button>
    </div>

    <!-- Step 2: OTP -->
    <div id="step2" class="step">
      <div class="form-group">
        <label class="form-label">Enter OTP</label>
        <input id="otp" class="form-control" type="text" placeholder="6-digit OTP" maxlength="6" style="letter-spacing:6px;font-size:20px;text-align:center">
        <p class="otp-hint">OTP sent to <span id="phone-display"></span></p>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="verifyOtp()">
        Verify &amp; Login
      </button>
      <button class="btn btn-outline" style="width:100%;justify-content:center;margin-top:8px" onclick="back()">
        Change Number
      </button>
    </div>

    <div class="login-footer">
      Only users with ADMIN or SUPER_ADMIN role can access this panel.
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
(function(){
  var token = localStorage.getItem('remont_admin_token');
  var user = {};
  try { user = JSON.parse(localStorage.getItem('remont_admin_user') || '{}'); } catch(e){}
  if (token && ['ADMIN','SUPER_ADMIN'].indexOf(user.role) !== -1) {
    window.location.replace('/admin/dashboard.html');
  }
})();

var phoneVal = '';

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearErr() { document.getElementById('err').style.display = 'none'; }

function sendOtp() {
  clearErr();
  phoneVal = document.getElementById('phone').value.trim();
  if (!phoneVal || phoneVal.length < 10) { showErr('Enter a valid phone number'); return; }
  if (!phoneVal.startsWith('+')) phoneVal = '+91' + phoneVal.replace(/^0/, '');

  var btn = event.target;
  btn.disabled = true; btn.textContent = 'Sending...';

  fetch(API_BASE + '/api/v1/auth/send-otp', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ phone: phoneVal })
  }).then(function(r){ return r.json(); }).then(function(d){
    btn.disabled = false; btn.textContent = 'Send OTP';
    if (!d.success && d.statusCode !== 200 && d.statusCode !== 201) {
      showErr(d.message || 'Failed to send OTP');
      return;
    }
    document.getElementById('phone-display').textContent = phoneVal;
    document.getElementById('step1').classList.remove('active');
    document.getElementById('step2').classList.add('active');
    document.getElementById('otp').focus();
  }).catch(function(e){
    btn.disabled = false; btn.textContent = 'Send OTP';
    showErr('Cannot connect to server. Check your network.');
  });
}

function verifyOtp() {
  clearErr();
  var otp = document.getElementById('otp').value.trim();
  if (!otp || otp.length < 4) { showErr('Enter the OTP'); return; }

  var btn = event.target;
  btn.disabled = true; btn.textContent = 'Verifying...';

  fetch(API_BASE + '/api/v1/auth/verify-otp', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ phone: phoneVal, otp: otp })
  }).then(function(r){ return r.json(); }).then(function(d){
    btn.disabled = false; btn.textContent = 'Verify & Login';
    var payload = d.data || d;
    if (!payload || !payload.accessToken) {
      showErr(d.message || 'Invalid OTP');
      return;
    }
    var role = payload.user && payload.user.role;
    if (['ADMIN','SUPER_ADMIN'].indexOf(role) === -1) {
      showErr('Access denied. This account does not have admin privileges.');
      return;
    }
    localStorage.setItem('remont_admin_token', payload.accessToken);
    localStorage.setItem('remont_admin_user', JSON.stringify(payload.user));
    window.location.replace('/admin/dashboard.html');
  }).catch(function(e){
    btn.disabled = false; btn.textContent = 'Verify & Login';
    showErr('Cannot connect to server.');
  });
}

function back() {
  clearErr();
  document.getElementById('otp').value = '';
  document.getElementById('step2').classList.remove('active');
  document.getElementById('step1').classList.add('active');
}

document.getElementById('phone').addEventListener('keydown', function(e){ if(e.key==='Enter') sendOtp(); });
document.getElementById('otp').addEventListener('keydown', function(e){ if(e.key==='Enter') verifyOtp(); });
</script>
</body>
</html>
