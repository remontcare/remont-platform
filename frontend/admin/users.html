<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Remont Admin — Users</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="topbar">
    <div class="topbar-left"><h1>Users</h1><p>Manage registered users</p></div>
    <div class="topbar-right">
      <span class="admin-chip">👤 <span id="admin-name"></span></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-header">
        <span class="card-title">All Users</span>
      </div>
      <div style="padding:14px 20px;border-bottom:1px solid #f1f5f9">
        <div class="filter-bar">
          <input id="q" class="search-input" placeholder="Search name / phone / email…" oninput="debounce(load)">
          <select id="role" class="form-control" style="width:160px" onchange="load()">
            <option value="">All Roles</option>
            <option value="CUSTOMER">Customer</option>
            <option value="SERVICE_VENDOR">Service Vendor</option>
            <option value="PRODUCT_VENDOR">Product Vendor</option>
            <option value="DELIVERY_PARTNER">Delivery Partner</option>
            <option value="CRM_AGENT">CRM Agent</option>
            <option value="ADMIN">Admin</option>
            <option value="SUPER_ADMIN">Super Admin</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <div id="tbl" class="loading">Loading…</div>
      </div>
    </div>
  </div>
</div>

<!-- Wallet modal -->
<div id="wallet-overlay" class="overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Adjust Wallet</span>
      <button class="modal-close" onclick="closeModal('wallet-overlay')">×</button>
    </div>
    <p style="font-size:13px;color:#64748b;margin-bottom:16px">User: <strong id="wallet-user-name"></strong></p>
    <div class="form-group">
      <label class="form-label">Amount (₹) <span style="font-size:11px;color:#94a3b8">Use negative to debit</span></label>
      <input id="wallet-amount" class="form-control" type="number" placeholder="e.g. 100 or -50">
    </div>
    <div class="form-group">
      <label class="form-label">Notes</label>
      <input id="wallet-notes" class="form-control" type="text" placeholder="Reason for adjustment">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal('wallet-overlay')">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="saveWallet()">Save</button>
    </div>
  </div>
</div>

<script src="./common.js"></script>
<script>
renderSidebar('users');
if (!requireAuth()) {}

var selectedUserId = '';
var timer;
function debounce(fn) { clearTimeout(timer); timer = setTimeout(fn, 400); }

function load() {
  var q = document.getElementById('q').value.trim();
  var role = document.getElementById('role').value;
  var path = '/admin/users?limit=80' + (q ? '&q=' + encodeURIComponent(q) : '') + (role ? '&role=' + role : '');
  document.getElementById('tbl').innerHTML = '<div class="loading">Loading…</div>';
  api('GET', path).then(renderTable).catch(function(e){
    document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>' + escape(e.message) + '</h3></div>';
  });
}

function renderTable(users) {
  if (!users || !users.length) {
    document.getElementById('tbl').innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><h3>No users found</h3></div>';
    return;
  }
  var rows = users.map(function(u) {
    return '<tr>' +
      '<td><strong>' + escape(u.name||'—') + '</strong><br><span class="text-muted">' + escape(u.phone) + '</span></td>' +
      '<td>' + escape(u.email||'—') + '</td>' +
      '<td><span class="badge ' + roleBadge(u.role) + '">' + u.role + '</span></td>' +
      '<td>' + fmtCur(u.walletBalance) + '</td>' +
      '<td><span class="badge ' + (u.isBlocked?'badge-red':'badge-green') + '">' + (u.isBlocked?'Blocked':'Active') + '</span></td>' +
      '<td>' + fmtDate(u.createdAt) + '</td>' +
      '<td style="white-space:nowrap">' +
        '<button class="btn btn-xs ' + (u.isBlocked?'btn-success':'btn-danger') + '" onclick="toggleBlock(\'' + u.id + '\',' + (!u.isBlocked) + ',this)">' + (u.isBlocked?'Unblock':'Block') + '</button> ' +
        '<button class="btn btn-xs btn-outline" onclick="openWallet(\'' + u.id + '\',\'' + escape(u.name||u.phone) + '\')">Wallet</button>' +
      '</td>' +
    '</tr>';
  }).join('');
  document.getElementById('tbl').innerHTML =
    '<table><thead><tr><th>Name / Phone</th><th>Email</th><th>Role</th><th>Wallet</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

function roleBadge(r) {
  var m = {CUSTOMER:'badge-blue',SERVICE_VENDOR:'badge-purple',PRODUCT_VENDOR:'badge-orange',DELIVERY_PARTNER:'badge-yellow',ADMIN:'badge-red',SUPER_ADMIN:'badge-red',CRM_AGENT:'badge-green'};
  return m[r] || 'badge-gray';
}

function toggleBlock(id, block, btn) {
  btn.disabled = true;
  api('PATCH', '/admin/users/' + id + '/block', { block: block }).then(function() {
    toast(block ? 'User blocked' : 'User unblocked', block ? 'error' : 'success');
    load();
  }).catch(function(e){ toast(e.message, 'error'); btn.disabled = false; });
}

function openWallet(id, name) {
  selectedUserId = id;
  document.getElementById('wallet-user-name').textContent = name;
  document.getElementById('wallet-amount').value = '';
  document.getElementById('wallet-notes').value = '';
  document.getElementById('wallet-overlay').classList.add('open');
}

function saveWallet() {
  var amount = parseFloat(document.getElementById('wallet-amount').value);
  var notes = document.getElementById('wallet-notes').value.trim();
  if (isNaN(amount)) { toast('Enter a valid amount', 'error'); return; }
  if (!notes) { toast('Enter notes', 'error'); return; }
  api('PATCH', '/admin/users/' + selectedUserId + '/wallet', { amount: amount, notes: notes })
    .then(function(){ toast('Wallet updated', 'success'); closeModal('wallet-overlay'); load(); })
    .catch(function(e){ toast(e.message, 'error'); });
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

load();
</script>
</body>
</html>
